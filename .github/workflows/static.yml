name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]

  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Hoặc phiên bản Node bạn đang dùng ở máy local

      - name: Install dependencies & Build Angular
        run: |
          cd Frontend
          npm install
          npx ng build --configuration production --base-href /Embedding-Database/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Chỉ định đường dẫn tới thư mục sản phẩm sau khi build (thường là dist/<tên-app>)
          # Bạn có thể check lại trong file angular.json ở local mục "outputPath" để điền chính xác
          path: 'Frontend/dist/frontend/browser' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
