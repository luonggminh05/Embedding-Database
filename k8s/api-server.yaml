apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: api_server:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "4"]
          ports:
            - containerPort: 8001
          env:
            - name: TEI_URL
              value: "http://embedding-server:80"
            - name: SQL_SERVER
              value: "sqlserver"
            - name: SQL_USER
              value: "sa"
            - name: SQL_PASSWORD
              value: "YourStrong!Passw0rd"
            - name: SQL_DATABASE
              value: "master"
            - name: API_PORT
              value: "8001"
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
spec:
  type: NodePort
  selector:
    app: api-server
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
      nodePort: 30001
