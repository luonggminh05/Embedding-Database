apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tei-model-pvc
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-server
  template:
    metadata:
      labels:
        app: embedding-server
    spec:
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.2
          command: ["text-embeddings-router", "--model-id", "BAAI/bge-m3", "--port", "80"]
          ports:
            - containerPort: 80
          volumeMounts:
            - name: model-data
              mountPath: /data
      volumes:
        - name: model-data
          persistentVolumeClaim:
            claimName: tei-model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-server
spec:
  type: NodePort
  selector:
    app: embedding-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
