apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: rag_api_dotnet:latest
          imagePullPolicy: IfNotPresent
          command: ["dotnet"]
          args: ["RagApi.dll"]
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: Tei__Url
              value: "http://embedding-server:80"
            - name: UpRAG__LMStudioEndpoint
              value: "http://YOUR_LM_STUDIO_IP:1224/v1"
            - name: UpRAG__ModelId
              value: "qwen2.5-vl-7b-instruct"
            - name: SqlServer__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: connection-string
            - name: Search__TopKMax
              value: "50"
            - name: Search__ChatTopK
              value: "3"
            - name: Search__VectorCandidateCount
              value: "200"
            - name: Search__RrfConstant
              value: "60"
            - name: Search__QueryEmbeddingCacheSize
              value: "1024"
            - name: Search__QueryEmbeddingCacheTtlSeconds
              value: "3600"
            - name: Ingestion__Enabled
              value: "true"
            - name: Ingestion__PapersDirectory
              value: "/opt/papers"
            - name: Ingestion__EnableOcr
              value: "true"
            - name: Ingestion__TessdataPath
              value: "/usr/share/tesseract-ocr/5/tessdata"
            - name: Ingestion__EnableVisionCaption
              value: "true"
            - name: Ingestion__VisionApiUrl
              value: "http://YOUR_LM_STUDIO_IP:1224/v1/chat/completions"
            - name: Ingestion__VisionApiKey
              value: "lm-studio"
            - name: Ingestion__VisionModel
              value: "qwen2.5-vl-7b-instruct"
            - name: Ingestion__MinVisionImageWidth
              value: "100"
            - name: Ingestion__MinVisionImageHeight
              value: "100"
            - name: Ingestion__VisionTimeoutSeconds
              value: "160"
            - name: Ingestion__MaxVisionImagesPerSlide
              value: "0"
            - name: Ingestion__MaxVisionImagesPerFile
              value: "0"
            - name: DOTNET_gcServer
              value: "0"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: papers
              mountPath: /opt/papers
      volumes:
        - name: papers
          hostPath:
            path: /opt/papers
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
spec:
  type: NodePort
  selector:
    app: api-server
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8080
      nodePort: 30001