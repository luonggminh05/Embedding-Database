apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: rag_api_dotnet:latest
          imagePullPolicy: IfNotPresent
          command: ["dotnet"]
          args: ["RagApi.dll"]
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: Tei__Url
              value: "http://embedding-server:80"
            - name: SqlServer__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: connection-string
            - name: Search__TopKMax
              value: "50"
            - name: Search__VectorCandidateCount
              value: "200"
            - name: Search__RrfConstant
              value: "60"
            - name: Search__QueryEmbeddingCacheSize
              value: "1024"
            - name: Search__QueryEmbeddingCacheTtlSeconds
              value: "3600"
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
spec:
  type: NodePort
  selector:
    app: api-server
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8080
      nodePort: 30001
